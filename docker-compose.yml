version: "3.9"

services:

  django:
    build: .

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    depends_on:
      - redis
      - db

    env_file:
      - .env

    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "

  redis:
    image: redis:7-alpine

    ports:
      - "6379:6379"

  celery:
    build: .
    command: celery -A config worker -l info
    volumes:
      - .:/app
    depends_on:
      - redis
    env_file:
      - .env
  
  db:
    image: postgres:16
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: django_db
      POSTGRES_USER: django_user
      POSTGRES_PASSWORD: django_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: